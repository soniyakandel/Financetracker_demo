<!DOCTYPE html>
<html>
<head>
    <title>Finance Tracker</title>
</head>
<body>
    <h1>Finance Tracker</h1>
    <p>Total spent: Rs {{ total }}</p>
    <a href="/add">Add Expense</a>
    <table border="1">
        <tr>
            <th>Title</th>
            <th>Amount</th>
            <th>Category</th>
            <th>Date</th>
            <th></th>
        </tr>
        {% for expense in expenses %}
        <tr>
            <td>{{ expense.title }}</td>
            <td>{{ expense.amount }}</td>
            <td>{{ expense.category }}</td>
            <td>{{ expense.date.strftime("%d %b %Y") }}</td>
            <td>
                <a href="/edit/{{ expense.id }}">edit</a>
                <a href="/delete/{{ expense.id }}">delete</a>
            </td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
